name: deploy

# Auto-deploy controlplane + console to the production VPS.
# Mirrors deploy/deploy_controlplane.py — cross-compiles Go binaries on the
# runner, builds the UI on the runner, ships both as prebuilt artefacts to
# /opt/control-one/deploy/ on the server, then runs docker build + docker
# compose up over SSH. Never runs `go build` on the server (small VPS,
# cgo/Go toolchain OOMs are a known incident — see deploy_controlplane.py).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (defaults to main)'
        required: false
        default: 'main'

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GO_VERSION: '1.25.7'
      NODE_VERSION: '20'
      DEPLOY_DIR: /opt/control-one/deploy
      DEPLOY_AGENT_DIR: /opt/control-one/deploy/agent-binaries
      DEPLOY_PREBUILT_DIR: /opt/control-one/deploy/prebuilt
      DEPLOY_UI_DIR: /opt/control-one/deploy/ui-dist

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cross-compile Go binaries (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -trimpath -ldflags='-s -w' -o dist/controlplane    ./controlplane/cmd/controlplane
          go build -trimpath -ldflags='-s -w' -o dist/bootstrap-admin ./controlplane/cmd/bootstrap-admin
          go build -trimpath -ldflags='-s -w' -o dist/controlone-agent-linux-amd64 ./cmd/nodeagent
          ls -lh dist/

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        working-directory: ui
        env:
          # Same-origin: APIClient defaults to '' so '/api/...' resolves to
          # the same host the UI was loaded from. nginx-edge proxies it to
          # the controlplane container. Setting VITE_API_URL here would
          # double-prefix '/api/api/...'.
          VITE_API_URL: ''
          # Cloudflare advertises HTTP/3 on the demo host, and long-lived
          # fetch streams can surface QUIC transport noise in Chromium. Keep
          # correctness via page polling unless the deployment explicitly
          # opts back into SSE.
          VITE_LIVE_EVENTS_MODE: ${{ vars.VITE_LIVE_EVENTS_MODE || 'polling' }}
        run: |
          npm ci --no-audit --no-fund
          npm run build
          ls -lh dist/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust SSH host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Ensure remote directories
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          ssh -p "${SSH_PORT:-22}" "$SSH_USERNAME@$SSH_HOST" "
            mkdir -p '$DEPLOY_PREBUILT_DIR' '$DEPLOY_AGENT_DIR' '$DEPLOY_UI_DIR' '$DEPLOY_DIR/nginx' '$DEPLOY_DIR/doris' '$DEPLOY_DIR/threat-intel' '$DEPLOY_DIR/analytics'
            chown 65532:65532 '$DEPLOY_DIR/threat-intel' '$DEPLOY_DIR/analytics'
            chmod 750 '$DEPLOY_DIR/threat-intel' '$DEPLOY_DIR/analytics'
          "

      - name: Ensure Doris host prerequisites
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          ssh -p "${SSH_PORT:-22}" "$SSH_USERNAME@$SSH_HOST" '
            set -e
            cd /opt/control-one/deploy
            analytics_mode=$({ grep "^ANALYTICS_MODE=" .env 2>/dev/null || true; } | tail -1 | cut -d= -f2-)
            doris_enabled=$({ grep "^DORIS_ENABLED=" .env 2>/dev/null || true; } | tail -1 | cut -d= -f2-)
            analytics_mode=$(printf "%s" "${analytics_mode:-small}" | tr "[:upper:]" "[:lower:]")
            doris_enabled=$(printf "%s" "${doris_enabled:-false}" | tr "[:upper:]" "[:lower:]")
            run_doris=false
            if [ "$analytics_mode" = "olap" ]; then
              run_doris=true
            fi
            case "$doris_enabled" in
              true|1|yes) run_doris=true ;;
            esac
            if [ "$run_doris" != "true" ]; then
              echo "Doris host prerequisites skipped for small analytics mode"
              exit 0
            fi
            if command -v sysctl >/dev/null 2>&1; then
              current_map_count=$(sysctl -n vm.max_map_count 2>/dev/null || echo 0)
              if [ "${current_map_count:-0}" -lt 2000000 ]; then
                sysctl -w vm.max_map_count=2000000 >/dev/null
              fi
              printf "vm.max_map_count=2000000\n" > /etc/sysctl.d/99-control-one-doris.conf || true
            fi
            if command -v swapon >/dev/null 2>&1 && swapon --noheadings --show | grep -q .; then
              swapoff -a
            fi
            if [ -f /sys/kernel/mm/transparent_hugepage/enabled ]; then
              printf "madvise\n" > /sys/kernel/mm/transparent_hugepage/enabled || true
              if [ -f /sys/kernel/mm/transparent_hugepage/defrag ]; then
                printf "madvise\n" > /sys/kernel/mm/transparent_hugepage/defrag || true
              fi
              printf "%s\n%s\n" \
                "w /sys/kernel/mm/transparent_hugepage/enabled - - - - madvise" \
                "w /sys/kernel/mm/transparent_hugepage/defrag - - - - madvise" \
                > /etc/tmpfiles.d/control-one-thp.conf
            fi
          '

      - name: Upload Go binaries
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          scp -P "${SSH_PORT:-22}" \
            dist/controlplane \
            dist/bootstrap-admin \
            "$SSH_USERNAME@$SSH_HOST:$DEPLOY_PREBUILT_DIR/"
          scp -P "${SSH_PORT:-22}" \
            dist/controlone-agent-linux-amd64 \
            "$SSH_USERNAME@$SSH_HOST:$DEPLOY_AGENT_DIR/"
          ssh -p "${SSH_PORT:-22}" "$SSH_USERNAME@$SSH_HOST" "
            chmod +x '$DEPLOY_PREBUILT_DIR/controlplane' '$DEPLOY_PREBUILT_DIR/bootstrap-admin' '$DEPLOY_AGENT_DIR/controlone-agent-linux-amd64'
          "

      - name: Upload UI dist + Dockerfiles + nginx config
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          # tarball UI dist for one-shot transfer
          tar -C ui -czf ui-dist.tar.gz dist
          scp -P "${SSH_PORT:-22}" ui-dist.tar.gz \
            "$SSH_USERNAME@$SSH_HOST:$DEPLOY_DIR/ui-dist.tar.gz"
          scp -P "${SSH_PORT:-22}" \
            deploy/Dockerfile.controlplane.prebuilt \
            deploy/Dockerfile.console.prebuilt \
            deploy/docker-compose.yaml \
            "$SSH_USERNAME@$SSH_HOST:$DEPLOY_DIR/"
          scp -P "${SSH_PORT:-22}" \
            deploy/nginx/console.conf \
            "$SSH_USERNAME@$SSH_HOST:$DEPLOY_DIR/nginx/console.conf"
          scp -P "${SSH_PORT:-22}" \
            deploy/doris/be_custom.conf \
            "$SSH_USERNAME@$SSH_HOST:$DEPLOY_DIR/doris/be_custom.conf"
          ssh -p "${SSH_PORT:-22}" "$SSH_USERNAME@$SSH_HOST" "
            set -e
            rm -rf '$DEPLOY_UI_DIR'
            mkdir -p '$DEPLOY_UI_DIR'
            tar -C '$DEPLOY_UI_DIR' --strip-components=1 -xzf '$DEPLOY_DIR/ui-dist.tar.gz'
            rm '$DEPLOY_DIR/ui-dist.tar.gz'
          "

      - name: Build images and restart services
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          ssh -p "${SSH_PORT:-22}" "$SSH_USERNAME@$SSH_HOST" "
            set -e
            cd '$DEPLOY_DIR'
            # Free the small VPS' hottest optional memory consumer before
            # Docker assembles the two prebuilt images. Doris is only started
            # for explicit OLAP deployments.
            docker compose --profile olap stop -t 30 doris-be || true
            docker build -t controlone/controlplane:latest \
              -f Dockerfile.controlplane.prebuilt .
            docker build -t controlone/console:latest \
              -f Dockerfile.console.prebuilt .
            analytics_mode=\$({ grep '^ANALYTICS_MODE=' .env 2>/dev/null || true; } | tail -1 | cut -d= -f2-)
            doris_enabled=\$({ grep '^DORIS_ENABLED=' .env 2>/dev/null || true; } | tail -1 | cut -d= -f2-)
            analytics_mode=\$(printf '%s' "\${analytics_mode:-small}" | tr '[:upper:]' '[:lower:]')
            doris_enabled=\$(printf '%s' "\${doris_enabled:-false}" | tr '[:upper:]' '[:lower:]')
            run_doris=false
            if [ "\$analytics_mode" = "olap" ]; then
              run_doris=true
            fi
            case "\$doris_enabled" in
              true|1|yes) run_doris=true ;;
            esac
            if [ "\$run_doris" = "true" ]; then
              docker compose --profile olap up -d doris-fe doris-be
            else
              docker compose --profile olap stop -t 30 doris-be doris-fe || true
            fi
            docker compose up -d --force-recreate --no-deps controlplane console
          "

      - name: Smoke check (server-side, bypasses Cloudflare)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          # Hit /healthz on the controlplane container directly via SSH so
          # Cloudflare's bot-protection on the public hostname can't 403 the
          # GitHub-runner IP and block what is otherwise a healthy deploy.
          # The service is published on host localhost; using that address
          # avoids brittle Docker-network discovery when controlplane joins
          # multiple networks.
          ssh -p "${SSH_PORT:-22}" "$SSH_USERNAME@$SSH_HOST" '
            set -e
            cd /opt/control-one/deploy
            # In small-analytics mode the controlplane should not wait for
            # Doris; OLAP deployments can still opt in through DORIS_ENABLED.
            for i in $(seq 1 24); do
              if curl -fsS --max-time 5 http://127.0.0.1:8443/healthz 2>/dev/null; then
                echo
                echo "✓ controlplane /healthz OK"
                break
              fi
              echo "... attempt $i: waiting 5s"
              sleep 5
              if [ "$i" = "24" ]; then
                echo "controlplane /healthz never returned 200"
                docker logs deploy-controlplane-1 --tail 30 || true
                exit 1
              fi
            done
            analytics_mode=$({ grep "^ANALYTICS_MODE=" .env 2>/dev/null || true; } | tail -1 | cut -d= -f2-)
            doris_enabled=$({ grep "^DORIS_ENABLED=" .env 2>/dev/null || true; } | tail -1 | cut -d= -f2-)
            analytics_mode=$(printf "%s" "${analytics_mode:-small}" | tr "[:upper:]" "[:lower:]")
            doris_enabled=$(printf "%s" "${doris_enabled:-false}" | tr "[:upper:]" "[:lower:]")
            run_doris=false
            if [ "$analytics_mode" = "olap" ]; then
              run_doris=true
            fi
            case "$doris_enabled" in
              true|1|yes) run_doris=true ;;
            esac
            if [ "$run_doris" = "true" ]; then
              echo "checking doris-be stability"
              doris_restarts_before=$(docker inspect deploy-doris-be-1 --format "{{.RestartCount}}" 2>/dev/null || echo -1)
              sleep 20
              doris_running=$(docker inspect deploy-doris-be-1 --format "{{.State.Running}}" 2>/dev/null || echo false)
              doris_restarts_after=$(docker inspect deploy-doris-be-1 --format "{{.RestartCount}}" 2>/dev/null || echo -1)
              if [ "$doris_running" != "true" ] || [ "$doris_restarts_after" != "$doris_restarts_before" ]; then
                echo "doris-be is not stable after deploy"
                docker inspect deploy-doris-be-1 --format "running={{.State.Running}} restarts={{.RestartCount}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}" || true
                docker logs deploy-doris-be-1 --tail 60 || true
                exit 1
              fi
              docker compose --profile olap exec -T doris-fe grep -q -- "-Xmx1500m" /opt/apache-doris/fe/conf/fe.conf
              if docker compose --profile olap exec -T doris-fe grep -q -- "-Xmx8192m" /opt/apache-doris/fe/conf/fe.conf; then
                echo "doris-fe still has the image default 8 GB heap"
                exit 1
              fi
              docker compose --profile olap exec -T doris-be grep -q -- "-Xmx512m" /opt/apache-doris/be/conf/be.conf
              echo "doris-be stable"
            else
              echo "Doris disabled for small-analytics deploy; skipped FE/BE stability checks"
            fi
          '

      - name: Public smoke check (best-effort, warns on Cloudflare 403)
        env:
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL || 'https://control-one.cloudspacetechs.com/healthz' }}
        continue-on-error: true
        run: |
          # Public check uses a real-browser UA so Cloudflare doesn't block
          # the runner IP. continue-on-error: an external 403 here never
          # fails a deploy that the in-network check already verified.
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            --max-time 10 \
            -A 'Mozilla/5.0 (deploy-smoke-check)' \
            "$HEALTHCHECK_URL" || echo "000")
          if [ "$status" = "200" ]; then
            echo "✓ public healthz returned 200"
          else
            echo "⚠ public healthz returned $status (likely Cloudflare bot block on runner IP — server-side check already verified the deploy)"
          fi
