name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  lint-test-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Format check
        run: gofmt -l . && test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -short ./...

      - name: Setup Node (frontend)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        if: matrix.os == 'ubuntu-latest'
        run: npm ci --prefix ui

      - name: Frontend lint
        if: matrix.os == 'ubuntu-latest'
        env:
          ESLINT_USE_FLAT_CONFIG: "false"
        run: npm run lint --prefix ui

      - name: Frontend tests
        if: matrix.os == 'ubuntu-latest'
        run: npm run test --prefix ui

      - name: Storage integration tests
        if: matrix.os == 'ubuntu-latest'
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: go test -v ./controlplane/internal/storage -run TestJobLifecycleWithPostgres -count=1
      - name: Migration integration test
        if: matrix.os == 'ubuntu-latest'
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: go test -v ./controlplane/internal/migrate -run TestMigrationsUpAndDown -count=1

      - name: Build agent
        run: go build -o ${{ runner.temp }}/nodeagent ./cmd/nodeagent

      - name: Build control plane
        run: go build -o ${{ runner.temp }}/controlplane ./controlplane/cmd/controlplane

      - name: Generate wizard bundle
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/wizard/setup_control_one.sh --output ./build/wizard --non-interactive --no-certs

      - name: Upload wizard bundle
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: control-one-wizard-${{ github.sha }}
          path: build/wizard
          retention-days: 7

  goreleaser:
    needs: lint-test-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
