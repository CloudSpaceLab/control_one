http:
  address: ":8443"
  read_timeout: 15s
  write_timeout: 15s

tls:
  enabled: false
  cert_file: ""
  key_file: ""
  client_ca_file: ""
  require_client_tls: false

observability:
  enable_metrics: true
  metrics_path: /metrics

database:
  url: postgresql://controlone:controlone@localhost:5432/controlone?sslmode=disable
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 15m
  apply_migrations: true

worker:
  concurrency: 4
  queue_size: 256

jobs:
  provisioning:
    api_base_url: ""
    token: ""
    template: ""
    provider: ""
    baselines: []
    auto_remediation: true
    tls:
      cert_file: ""
      key_file: ""
      ca_cert_file: ""
  compliance:
    api_base_url: ""
    token: ""
    region: ""
    rule_sets: []
    certifications: []
    auto_apply: true
    schedule_enabled: false       # Enable periodic compliance scans
    schedule_cron: "0 */6 * * *"  # Cron expression (default: every 6 hours)
    tls:
      cert_file: ""
      key_file: ""
      ca_cert_file: ""

auth:
  oidc:
    enabled: true
    issuer_url: "https://issuer.example.com"
    client_id: "control-one"
    audience:
      - "control-one-api"
    username_claim: preferred_username
    groups_claim: groups
    cache_ttl: 5m
  rbac:
    default_role: viewer
    role_mappings:
      operator:
        - "ops-team"
      admin:
        - "platform-admins"

registration:
  bootstrap_tokens:
    - "CHANGE_ME_TOKEN"
  default_tenant_id: ""

agent:
  # Directory the control plane serves agent binaries from. Files inside must
  # be named `controlone-agent-<os>-<arch>` (e.g. controlone-agent-linux-amd64),
  # matching the resolution in agent_download.go:resolveBinaryPath. The control
  # plane streams the matching file in response to /api/v1/agent/binary.
  binary_dir: ""

  # ed25519 private-key path used to sign the per-binary manifest. The signature
  # is exposed via /api/v1/agent/binary/manifest and verified by the agent
  # (self-update path) and the installer (`controlone-agent verify-binary`).
  # Generate with: openssl genpkey -algorithm ed25519 -out signing.key
  signing_key_path: ""

  # ed25519 public-key path. Served verbatim from /api/v1/agent/public-key and
  # also pinned by the agent at enrollment time so subsequent self-updates can
  # verify against a key that doesn't depend on the control plane being honest
  # at update time. Must match signing_key_path.
  signing_public_key_path: ""

  # When true, /api/v1/agent/binary and /api/v1/agent/binary/manifest skip the
  # enrollment-token check. Default: false (token required). Flip on only for
  # legacy bootstrap paths that cannot mint a token, and pair with a network
  # allow-list. /api/v1/agent/install-script always requires a valid token
  # regardless of this flag.
  allow_anonymous_binary: false
