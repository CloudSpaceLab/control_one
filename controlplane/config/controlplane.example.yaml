http:
  address: ":8443"
  read_timeout: 15s
  write_timeout: 15s

tls:
  enabled: false
  cert_file: ""
  key_file: ""
  client_ca_file: ""
  require_client_tls: false

observability:
  enable_metrics: true
  metrics_path: /metrics

aml:
  base_url: "" # e.g. https://aml-service.internal:8090
  api_key: ""
  timeout: 10s
  allow_insecure: false
  insecure_skip_verify: false

threat_intel:
  snapshot_dir: data/threat-intel

database:
  url: postgresql://controlone:controlone@localhost:5432/controlone?sslmode=disable
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 15m
  apply_migrations: true

doris:
  enabled: false
  dsn: ""
  http_endpoint: ""
  database: controlone
  user: root
  password: ""
  apply_migrations: false
  # Dev/single-node Doris can use 1. Bank production clusters should set 3
  # after provisioning at least three backend replicas.
  replication_num: 3

worker:
  concurrency: 4
  queue_size: 256

jobs:
  provisioning:
    api_base_url: ""
    token: ""
    template: ""
    provider: ""
    baselines: []
    auto_remediation: true
    tls:
      cert_file: ""
      key_file: ""
      ca_cert_file: ""
  compliance:
    api_base_url: ""
    token: ""
    region: ""
    rule_sets: []
    certifications: []
    auto_apply: true
    schedule_enabled: false       # Enable periodic compliance scans
    schedule_cron: "0 */6 * * *"  # Cron expression (default: every 6 hours)
    tls:
      cert_file: ""
      key_file: ""
      ca_cert_file: ""

auth:
  oidc:
    enabled: true
    issuer_url: "https://issuer.example.com"
    client_id: "control-one"
    audience:
      - "control-one-api"
    username_claim: preferred_username
    groups_claim: groups
    cache_ttl: 5m
  rbac:
    default_role: viewer
    role_mappings:
      operator:
        - "ops-team"
      admin:
        - "platform-admins"

registration:
  bootstrap_tokens:
    - "CHANGE_ME_TOKEN"
  default_tenant_id: ""
