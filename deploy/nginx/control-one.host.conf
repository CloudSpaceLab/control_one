map $http_x_forwarded_proto $needs_https_redirect {
    "https" 0;
    default  1;
}

server {
    listen 80;
    listen [::]:80;
    server_name control-one.cloudspacetechs.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ^~ /trust/ {
        if ($needs_https_redirect) {
            return 301 https://$host$request_uri;
        }
        return 308 /console$request_uri;
    }
    location = /intake {
        if ($needs_https_redirect) {
            return 301 https://$host$request_uri;
        }
        return 308 /console/intake$is_args$args;
    }
    location = /intake/ {
        if ($needs_https_redirect) {
            return 301 https://$host$request_uri;
        }
        return 308 /console/intake$is_args$args;
    }
    location = /intake-status {
        if ($needs_https_redirect) {
            return 301 https://$host$request_uri;
        }
        return 308 /console/intake-status$is_args$args;
    }
    location = /intake-status/ {
        if ($needs_https_redirect) {
            return 301 https://$host$request_uri;
        }
        return 308 /console/intake-status$is_args$args;
    }

    location = /console { return 301 /console/; }

    location /console/ {
        if ($needs_https_redirect) {
            return 301 https://$host$request_uri;
        }
        rewrite ^/console/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        if ($needs_https_redirect) {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        if ($needs_https_redirect) {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://127.0.0.1:3080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name control-one.cloudspacetechs.com;

    ssl_certificate     /etc/letsencrypt/live/control-one.cloudspacetechs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/control-one.cloudspacetechs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    ssl_verify_client optional_no_ca;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location ^~ /trust/ { return 308 /console$request_uri; }
    location = /intake { return 308 /console/intake$is_args$args; }
    location = /intake/ { return 308 /console/intake$is_args$args; }
    location = /intake-status { return 308 /console/intake-status$is_args$args; }
    location = /intake-status/ { return 308 /console/intake-status$is_args$args; }

    location = /console { return 301 /console/; }

    location /console/ {
        rewrite ^/console/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering on;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8443$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header X-SSL-Client-S-DN $ssl_client_s_dn;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_connect_timeout 10s;
    }

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
