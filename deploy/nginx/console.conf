server {
    listen 80;
    server_name console.control-one.cloudspacetechs.com;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback. index.html itself MUST NOT be cached so new deploys
    # surface immediately; the JS / CSS chunks below have hashed names
    # and stay cacheable for a year.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
        try_files $uri =404;
    }

    location / {
        # Each missing path falls back to /index.html (which is no-store).
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    # Hashed assets — safe to cache aggressively.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
}
