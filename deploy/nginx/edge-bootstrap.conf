# Bootstrap config used during first-run before Let's Encrypt has issued
# certs. Serves the ACME challenge path and a 200 healthz so certbot can
# complete HTTP-01. Once certs exist, switch the volume mount to edge.conf
# and `nginx -s reload`.
server {
    listen 80;
    server_name control-one.cloudspacetechs.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

    location / {
        return 200 "Control One — provisioning TLS, please wait.\n";
        add_header Content-Type text/plain;
    }
}
