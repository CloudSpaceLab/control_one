# Edge proxy — NOT used for external traffic on this host.
# System nginx on the host handles ports 80/443 (shared server with multiple domains).
# This config is kept so nginx-edge can serve the certbot ACME challenge webroot
# if Let's Encrypt cert renewal is ever moved back into this container.
#
# To serve ACME challenge via nginx-edge: expose port 80 in docker-compose and
# have system nginx proxy /.well-known/acme-challenge/ to the nginx-edge container.

server {
    listen 80;
    server_name control-one.cloudspacetechs.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS terminates here; upstream services run in the compose network.
server {
    listen 443 ssl;
    http2 on;
    server_name control-one.cloudspacetechs.com;

    ssl_certificate     /etc/letsencrypt/live/control-one.cloudspacetechs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/control-one.cloudspacetechs.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    ssl_verify_client optional_no_ca;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream_landing "http://landing:80";
        proxy_pass $upstream_landing;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /console { return 301 /console/; }
    location /console/ {
        set $upstream_console "http://console:80";
        rewrite ^/console/(.*)$ /$1 break;
        proxy_pass $upstream_console;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering on;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location /api/ {
        set $upstream_cp "http://controlplane:8443";
        proxy_pass $upstream_cp$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
        proxy_set_header Connection "";
        proxy_set_header X-SSL-Client-S-DN $ssl_client_s_dn;
    }

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
