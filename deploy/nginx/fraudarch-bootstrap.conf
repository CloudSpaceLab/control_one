# Bootstrap config for FraudArch (nibss.cloudspacetechs.com) used during first-run
# before Let's Encrypt has issued certs. Serves the ACME challenge path and a 200
# healthz so certbot can complete HTTP-01. Once certs exist, switch to fraudarch.conf.
server {
    listen 80;
    server_name nibss.cloudspacetechs.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

    location / {
        return 200 "FraudArch — provisioning TLS, please wait.\n";
        add_header Content-Type text/plain;
    }
}
