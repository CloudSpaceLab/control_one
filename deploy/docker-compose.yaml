services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6
    deploy:
      resources:
        limits:
          memory: 512m

  ipq:
    image: akyriako78/ipquery:0.1.18
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./ipquery-geolite:/home/nonroot/geolite:ro
    deploy:
      resources:
        limits:
          memory: 128m

  controlplane:
    image: controlone/controlplane:${TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.controlplane
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      ipq:
        condition: service_started
      doris-fe:
        condition: service_started   # don't block on FE health; controlplane retries
    # Doris FE redirects stream loads to the BE's 172.31.0.x address.
    # Attach the controlplane to that network too so follow-up PUTs can land.
    networks:
      default:
      doris:
    extra_hosts:
      - "host.docker.internal:172.21.0.1"
    environment:
      CONTROLPLANE_DATABASE_URL: "postgresql://${POSTGRES_USER:-controlone}:${POSTGRES_PASSWORD}@172.21.0.1:5432/${POSTGRES_DB:-controlone}?sslmode=disable"
      CONTROLPLANE_WORKER_REDIS_ADDRESS: "redis:6379"
      CONTROLPLANE_SECRETS_ENCRYPTION_KEY: "${SECRETS_ENCRYPTION_KEY}"
      CONTROLPLANE_REGISTRATION_BOOTSTRAP_TOKENS: "${BOOTSTRAP_TOKEN}"
      CONTROLPLANE_WEBAUTHN_RP_ID: "control-one.cloudspacetechs.com"
      CONTROLPLANE_WEBAUTHN_RP_NAME: "Control One"
      CONTROLPLANE_WEBAUTHN_RP_ORIGIN: "https://control-one.cloudspacetechs.com"
      CONTROLPLANE_DORIS_ENABLED: "${DORIS_ENABLED:-true}"
      CONTROLPLANE_DORIS_HTTP_ENDPOINT: "http://doris-fe:8030"
      CONTROLPLANE_DORIS_DSN: "root:${DORIS_PASSWORD}@tcp(doris-fe:9030)/controlone?parseTime=true"
      CONTROLPLANE_DORIS_DATABASE: "controlone"
      CONTROLPLANE_DORIS_USER: "root"
      CONTROLPLANE_DORIS_PASSWORD: "${DORIS_PASSWORD}"
      CONTROLPLANE_DORIS_APPLY_MIGRATIONS: "true"
      IPQUERY_BASE_URL: "http://ipq:8080"
      ABUSEIPDB_API_KEY: "${ABUSEIPDB_API_KEY}"
      THREAT_INTEL_SNAPSHOT_DIR: "/var/lib/control-one/threat-intel"
    volumes:
      - ./controlplane.yaml:/etc/control-one/controlplane.yaml:ro
      - ./agent-binaries:/var/lib/control-one/agent-binaries:ro
      - ./threat-intel:/var/lib/control-one/threat-intel
    ports:
      - "127.0.0.1:8443:8443"
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          memory: 1024m

  doris-fe:
    # Apache Doris frontend. Memory tuned LOW (1.5 GB) for a small box
    # (8 GB total). FE_JVM_HEAP_SIZE overrides the default 8 GB heap.
    # FE/BE require IP literals in FE_SERVERS / BE_ADDR — Docker DNS
    # names won't parse — so we assign static IPs on a dedicated network.
    image: apache/doris:fe-2.1.7
    restart: unless-stopped
    environment:
      FE_SERVERS: "fe1:172.31.0.10:9010"
      FE_ID: "1"
      JAVA_OPTS_FOR_JDK_17: "-Xmx1500m -Xms512m"
    networks:
      doris:
        ipv4_address: 172.31.0.10
      default:
    volumes:
      - dorisfedata:/opt/apache-doris/fe/doris-meta
    expose:
      - "8030"
      - "9030"
      - "9010"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8030/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1800m

  doris-be:
    # BE memory cap for the current 4 vCPU / 8 GB single-node SIEM deploy.
    # The mounted be_custom.conf keeps Doris' internal limit below this cgroup
    # ceiling so native/JVM allocator overhead and replay bursts do not exhaust
    # the container before Doris can shed work.
    # ulimits: start_be.sh hard-exits if nofile < 60000; 655350 is the
    # value Doris docs recommend. max_map_count must be >=2000000 on the
    # host (set via sysctl); swap must be disabled (swapoff -a).
    image: apache/doris:be-2.1.7
    restart: unless-stopped
    depends_on:
      doris-fe:
        condition: service_healthy
    environment:
      FE_SERVERS: "fe1:172.31.0.10:9010"
      BE_ADDR: "172.31.0.20:9050"
      JAVA_OPTS_FOR_JDK_17: "-Xmx512m -Xms128m"
      # init_be.sh registers BE by running `mysql -uroot ...` against FE
      # on port 9030. FE root has DORIS_PASSWORD set, so without this
      # env the mysql client auths with no password and the entrypoint
      # loops forever printing "register is failed, wait next~". MYSQL_PWD
      # is the documented mysql-client env for this exact case.
      MYSQL_PWD: "${DORIS_PASSWORD}"
    ulimits:
      nofile:
        soft: 655350
        hard: 655350
    networks:
      doris:
        ipv4_address: 172.31.0.20
      default:
    volumes:
      - ./doris/be_custom.conf:/opt/apache-doris/be/conf/be_custom.conf:ro
      - dorisbedata:/opt/apache-doris/be/storage
    expose:
      - "9060"
      - "8040"
      - "9050"
    deploy:
      resources:
        limits:
          memory: 3000m

  console:
    image: controlone/console:${TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.console
    restart: unless-stopped
    ports:
      - "127.0.0.1:3500:80"
    deploy:
      resources:
        limits:
          memory: 256m

  landing:
    image: controlone/landing:${TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.landing
    restart: unless-stopped
    ports:
      - "127.0.0.1:3080:80"
    deploy:
      resources:
        limits:
          memory: 128m

  nginx-edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - landing
      - console
      - controlplane
    # Expose only — system nginx on the host handles external traffic on 80/443.
    # nginx-edge is still used for certbot ACME challenge serving (via webroot).
    expose:
      - "80"
      - "443"
    extra_hosts:
      - "host.docker.internal:172.21.0.1"
    volumes:
      # Active config is swapped on disk by bootstrap.sh between bootstrap
      # (HTTP-only, for ACME) and edge (HTTPS, post-cert).
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    deploy:
      resources:
        limits:
          memory: 128m

  certbot:
    image: certbot/certbot:latest
    depends_on:
      - nginx-edge
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "trap exit TERM; while :; do
         certbot renew --webroot -w /var/www/certbot --quiet &&
         nginx -s reload 2>/dev/null;
         sleep 12h & wait $${!};
       done"

volumes:
  redisdata:
  certbot-etc:
  certbot-www:
  dorisfedata:
  dorisbedata:

networks:
  doris:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24
