# Control One small-node Doris BE profile for the current single-node SIEM VPS.
# Target host: 4 vCPU, 8 GB RAM, no swap. Keep Doris below its Docker hard
# limit while preserving headroom for allocator/JVM overhead and the OS.

mem_limit=45%
soft_mem_limit_frac=0.55
memory_mode=moderate

# The all-in-one demo VPS has no memory headroom for BE cache defaults. Disable
# the largest read caches and keep explicit small limits for versions that
# still initialize cache structures before honoring the disable flags.
disable_storage_page_cache=true
disable_storage_row_cache=true
storage_page_cache_limit=128M
row_cache_mem_limit=128M
inverted_index_searcher_cache_limit=64M
inverted_index_query_cache_limit=64M

# Event replay uses JSON Stream Load. Keep load memory and memtables bounded
# until replay chunking is implemented in the controlplane.
load_process_max_memory_limit_percent=20
load_process_soft_mem_limit_percent=30
write_buffer_size=33554432
streaming_load_json_max_mb=16

# Right-size worker pools for 4 vCPU. Doris defaults favor much larger hosts
# and can create excessive resident/virtual memory pressure on this deployment.
brpc_num_threads=32
be_service_threads=8
webserver_num_workers=8
fragment_pool_thread_num_min=4
fragment_pool_thread_num_max=32
doris_scanner_thread_pool_thread_num=8
doris_scanner_thread_pool_queue_size=4096
send_batch_thread_pool_thread_num=8
send_batch_thread_pool_queue_size=4096
make_snapshot_worker_count=2
release_snapshot_worker_count=2
