api_url: https://control-plane.example.com/api
bootstrap_token: CHANGE_ME
node_name: example-node
state_file: /var/lib/control-one/nodeagent/state.json
policy_dir: /var/lib/control-one/nodeagent/policies
log_dir: /var/log/control-one/nodeagent
plugin_dir: /opt/control-one/nodeagent/plugins

wizard:
  enabled: true
  auto_generate_certificates: true
  cert_validity: 2160h
  hosts:
    - ${HOSTNAME}
    - 127.0.0.1
  organization: Control One
  run_access_sync: true
  run_secrets_sync: true
  run_provisioning: false
  run_compliance: false
  emit_summary: true
  timeout: 45s

policy:
  public_key_file: /var/lib/control-one/nodeagent/keys/policy_pub.pem
  metadata_file: /var/lib/control-one/nodeagent/policies/policies.meta.json

scanner:
  timeout: 30s
  shell: ""
  max_concurrent: 4
  enabled: true
  preferred:
    - openscap
    - inspec
    - ansible
    - trivy
  fallback: builtin
  use_real_scan: true

mesh:
  enabled: true
  coordinator_url: https://mesh-control.example.com
  auth_token: CHANGE_ME
  namespace: default
  private_cidr: 10.1.0.0/16
  relay_nodes: []
  state_file: /var/lib/control-one/nodeagent/mesh/state.json
  poll_interval: 10m
  key_rotation: 168h

provisioning:
  template: ubuntu-web-tier
  provider: vmware # options: vmware, libvirt, aws, azure
  metadata:
    provider: vmware
    cluster: prod-cluster-1
    datacenter: dc-west
    datastore: vsan-primary
    network: web-tier
  baselines:
    - cis-ubuntu-24
    - control-one-hardening
  auto_remediation: true
  # Example for AWS instead:
  # provider: aws
  # metadata:
  #   region: eu-west-1
  #   vpc_id: vpc-123456
  #   subnet_id: subnet-abc123
  #   iam_profile: EC2InstanceProfile

compliance:
  region: eu
  rule_sets:
    - cis-level1
    - iso27001-section8
  certifications:
    - gdpr
    - soc2
  auto_apply_templates: true

access:
  provider: active_directory
  sync_interval: 30m
  default_role: operator
  api_endpoint: https://directory.example.com

secrets:
  backend: vault
  endpoint: https://vault.example.com
  groups:
    - production
    - shared-services
  sync_interval: 15m

hardening:
  profiles:
    - baseline
    - pci-dss
  allow_overrides: false

agent_runtime:
  profile: auto

telemetry_prefs:
  # Log collection is opt-in. When enabled, auto_discover_log_sources adds
  # eligible local sources from observed services; high-risk app profiles still
  # require explicit approval/configuration.
  collect_logs: false
  auto_discover_log_sources: true
  log_namespaces:
    - system
    - application
    - security
  log_sources:
    - program: nginx
      type: file
      paths:
        - /var/log/nginx/access.log
        - /var/log/nginx/error.log
      severity_map:
        notice: info
        crit: critical
      labels:
        stack: web
    - program: windows-iis
      type: eventlog
      event_channels:
        - "Microsoft-Windows-IIS-Logging/Operational"
      severity_map:
        Information: info
        Warning: warn
        Error: error
    - program: postgresql
      type: file
      paths:
        - /var/log/postgresql/postgresql-14-main.log
      formatter: generic
      format_rules:
        - regex: "^(?P<ts>\\d{4}-\\d{2}-\\d{2}\\s+\\d{2}:\\d{2}:\\d{2}\\.\\d+\\s+\\w+)\\s+\\[(?P<pid>\\d+)\\]\\s+(?P<level>\\w+):\\s+(?P<message>.*)$"
          timestamp_layout: "2006-01-02 15:04:05.999 MST"
          severity_field: level
          severity_map:
            LOG: info
            WARNING: warn
            ERROR: error
            FATAL: critical
            default: info
          fields:
            pid: "${pid}"
    - program: redis
      type: file
      paths:
        - /var/log/redis/redis-server.log
      formatter: generic
      format_rules:
        - regex: "^(?P<ts>\\d{2}\\s\\w+\\s\\d{2}:\\d{2}:\\d{2})\\s+(?P<level>\\w+)\\s+(?P<pid>\\d+):\\s*(?P<message>.*)$"
          timestamp_layout: "02 Jan 15:04:05"
          severity_field: level
          severity_map:
            warning: warn
            notice: notice
            default: info
          fields:
            pid: "${pid}"
    - program: kafka
      type: file
      paths:
        - /var/log/kafka/server.log
      formatter: generic
      format_rules:
        - regex: "^(?P<ts>\\d{4}-\\d{2}-\\d{2}\\s+\\d{2}:\\d{2}:\\d{2},\\d{3})\\s+(?P<level>\\w+)\\s+\\[(?P<thread>[^]]+)\\]\\s+(?P<class>[^ ]+)\\s+-\\s+(?P<message>.*)$"
          timestamp_layout: "2006-01-02 15:04:05,000"
          severity_field: level
          severity_map:
            WARN: warn
            ERROR: error
            INFO: info
            FATAL: critical
            default: info
          fields:
            thread: "${thread}"
            class: "${class}"
  file_integrity: true
  metrics_interval: 30s
  activity_interval: 2m
  # Optional predictive health probes. ICMP probes emit packet loss and latency
  # when ping is available; disk probes require smartctl on the host.
  health_probe_targets:
    - 1.1.1.1
    - 8.8.8.8
  health_probe_count: 4
  health_probe_timeout: 3s
  disk_health_devices:
    - /dev/sda

app_dependencies:
  # Read-only manifest/SBOM inventory for application dependency CVE coverage.
  enabled: true
  scan_roots:
    - /srv
    - /opt
    - /var/www
  include_dev_dependencies: false
  scan_interval: 6h
  max_depth: 8
  max_manifests: 512
  max_file_bytes: 1048576

content_pack_collector:
  # Optional wrapper for approved SIEM content-pack collector configs. It polls
  # the control plane for queued OTel/Alloy config, writes the exact approved
  # YAML, optionally validates/reloads the local collector, and reports apply
  # results with the collector-scoped token.
  enabled: false
  collector_id: edge-${HOSTNAME}
  kind: otel
  version: ""
  token: ""
  config_path: /var/lib/control-one/nodeagent/content-pack-collector/otel.yaml
  state_file: /var/lib/control-one/nodeagent/content-pack-collector/state.json
  # Optional OTel/Alloy Prometheus metrics scrape for receiver/source health.
  # Example: http://127.0.0.1:8888/metrics
  metrics_endpoint: ""
  metrics_timeout: 3s
  poll_interval: 30s
  apply_timeout: 30s
  validate_command:
    - /usr/bin/otelcol
    - validate
    - --config
    - ${C1_COLLECTOR_CONFIG}
  reload_command:
    - /bin/systemctl
    - reload
    - otelcol
  # Alternative to reload_command when the node agent should supervise the
  # collector process directly instead of using systemd/service manager.
  supervise_command: []
  # Example:
  # supervise_command:
  #   - /usr/bin/otelcol
  #   - --config
  #   - ${C1_COLLECTOR_CONFIG}

tls:
  cert_file: /var/lib/control-one/nodeagent/certs/nodeagent.crt
  key_file: /var/lib/control-one/nodeagent/certs/nodeagent.key
  ca_cert_file: /var/lib/control-one/nodeagent/certs/ca.crt

intervals:
  heartbeat: 60s
  policy_sync: 30m
  scan: 15m
  telemetry: 1m
  provisioning: 30m

# Session Recording Configuration
# Enable session recording only on nodes where required
session_recording:
  enabled: false  # Set to true to enable session recording on this node
  backend: tlog   # Options: tlog, auditx
  storage_path: /var/lib/control-one/nodeagent/sessions
  retention_days: 90
  max_size_mb: 1024
  compress: true
  upload_interval: 5m
  session_types:
    - terminal
    - ssh
  record_ssh: true
  record_terminal: true
  record_commands: true
  tlog_path: /usr/bin/tlog-rec
  auditx_path: /usr/bin/auditx
