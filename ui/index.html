<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control One</title>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%2308121f"/><circle cx="32" cy="32" r="20" fill="none" stroke="%2338bdf8" stroke-width="6"/><path d="M32 16v32M16 32h32" stroke="%23f8fafc" stroke-width="5" stroke-linecap="round"/></svg>' />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply persisted theme synchronously before any paint so light-mode
      // users don't see a flash of dark canvas while React mounts.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.add(t);
        } catch (_) { /* ignore */ }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
