{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "control-one.fullname" . }}-ui
  labels:
    {{- include "control-one.labels" . | nindent 4 }}
    component: ui
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "control-one.selectorLabels" . | nindent 4 }}
    component: ui
{{- end }}


