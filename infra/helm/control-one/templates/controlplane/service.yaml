{{- if .Values.controlplane.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "control-one.fullname" . }}-controlplane
  labels:
    {{- include "control-one.labels" . | nindent 4 }}
    component: controlplane
spec:
  type: {{ .Values.controlplane.service.type }}
  ports:
    - port: {{ .Values.controlplane.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "control-one.selectorLabels" . | nindent 4 }}
    component: controlplane
{{- end }}


