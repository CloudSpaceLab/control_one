# Minimal Jaeger all-in-one docker-compose snippet for local tracing. Run with
# OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 on the control plane and
# spans appear at http://localhost:16686.
#
# Compose with the rest of the observability stack by appending `-f jaeger.yml`
# to the main docker-compose invocation.
services:
  jaeger:
    image: jaegertracing/all-in-one:1.54
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    restart: unless-stopped
