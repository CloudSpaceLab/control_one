project_name: control-one-nodeagent

goos:
  - linux
  - windows
  - darwin

builds:
  - id: nodeagent
    main: ./cmd/nodeagent
    binary: nodeagent
    flags:
      - -trimpath
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0
    goarch:
      - amd64
      - arm64
    mod_timestamp: '{{ .CommitDate }}'
    hooks:
      pre: []

archives:
  - id: nodeagent-archive
    builds:
      - nodeagent
    format_overrides:
      - goos: windows
        format: zip
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - license*
      - README.md
      - configs/example-config.yaml=config/nodeagent.yaml
      - scripts/install.sh
      - scripts/install.ps1

checksums:
  name_template: '{{ .ProjectName }}_checksums.txt'

release:
  github:
    owner: CloudSpaceLab
    name: control_one
  draft: true
  header: |
    ## Control One Node Agent Release {{ .Version }}

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

dockers:
  - image_templates:
      - 'ghcr.io/cloudspacelab/control-one-nodeagent:{{ .Tag }}'
    dockerfile: build/docker/Dockerfile
    use: buildx
    goos: linux
    goarch:
      - amd64
      - arm64
