version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: controlone
      POSTGRES_PASSWORD: controlone
      POSTGRES_DB: controlone
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  controlplane:
    image: golang:1.23
    command: go run ./controlplane/cmd/controlplane --config controlplane/config/controlplane.dev.yaml
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - CONTROL_ONE_CONFIG=controlplane/config/controlplane.dev.yaml
    depends_on:
      - postgres
    ports:
      - "8443:8443"

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
