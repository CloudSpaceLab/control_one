services:
  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: controlone
      POSTGRES_PASSWORD: controlone
      POSTGRES_DB: controlone
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  controlplane:
    image: golang:1.24
    command: go run ./controlplane/cmd/controlplane --config controlplane/config/controlplane.dev.yaml
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - CONTROL_ONE_CONFIG=controlplane/config/controlplane.dev.yaml
      - GOPROXY=https://proxy.golang.org,direct
      - GOSUMDB=sum.golang.org
    depends_on:
      - redis
      - postgres
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    ports:
      - "3000:3000"
    volumes:
      - ./infra/observability/grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/observability/grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/observability/dashboards:/var/lib/grafana/dashboards/control-one:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
